name: Daily Data Build

on:
  schedule:
    - cron: "7 3 * * *"   # 03:07 UTC (~04/05:07 v ČR) každý den
  workflow_dispatch: {}


jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Europe/Prague
      # Můžeš přepnout na .jsonld nebo .json.gz – skript zvládá všechny.
      MPSV_URL: https://data.mpsv.cz/od/soubory/volna-mista/volna-mista.json
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build JSON shards
        run: npm run build

      - name: Deploy to Netlify (prod)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "NETLIFY_AUTH_TOKEN/NETLIFY_SITE_ID secrets are not set; skipping Netlify deploy."
            exit 0
          fi
          npx -y netlify-cli@latest deploy \
            --prod \
            --dir=public \
            --functions=netlify/functions \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --message "Daily data build ${GITHUB_SHA}"

      - name: Upload artifact (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
